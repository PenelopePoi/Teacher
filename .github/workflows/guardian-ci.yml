name: Guardian CI

on:
  pull_request:
    paths:
      - 'guardian/**'
      - '.github/workflows/guardian-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'guardian/**'
      - '.github/workflows/guardian-ci.yml'

concurrency:
  group: guardian-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core:
    name: core — types, tests, coverage
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: guardian/core
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: guardian/core/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Enforce coverage floor
        run: |
          summary=guardian/core/coverage/coverage-summary.json
          node -e "const s = require('./' + '$summary').total; const pct = s.statements.pct; if (pct < 85) { console.error('coverage floor 85% violated: statements=' + pct); process.exit(1); }"
        working-directory: ${{ github.workspace }}

  lambda:
    name: lambda — types, tests, bundle size
    runs-on: ubuntu-22.04
    needs: core
    defaults:
      run:
        working-directory: guardian/lambda
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: guardian/lambda/package-lock.json

      - name: Install core (for file: dep)
        working-directory: guardian/core
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Bundle
        run: npm run bundle

      - name: Enforce bundle size budget (≤ 2 MB)
        run: |
          size=$(wc -c < dist/handler.js)
          limit=$((2 * 1024 * 1024))
          echo "bundle: $size bytes (limit $limit)"
          if [ "$size" -gt "$limit" ]; then
            echo "::error::bundle exceeds 2 MB budget"
            exit 1
          fi

      - name: Upload bundle
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: guardian-lambda-bundle
          path: guardian/lambda/dist
          retention-days: 7

  infra:
    name: infra — typecheck only
    runs-on: ubuntu-22.04
    needs: core
    defaults:
      run:
        working-directory: guardian/infra
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: guardian/infra/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck Pulumi stack
        run: npm run typecheck

  gitleaks:
    name: secret scan
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
