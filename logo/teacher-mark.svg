<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Teacher">
  <title>Teacher — by XELA Creative Studio</title>

  <!-- Swarm satellites (multi-agent ASI) -->
  <g fill="#d4a017">
    <circle cx="35" cy="10" r="3.6"/>
    <circle cx="60" cy="5"  r="3.6"/>
    <circle cx="85" cy="10" r="3.6"/>
  </g>

  <!-- Connection lines -->
  <g stroke="#d4a017" stroke-width="1.2" opacity="0.55" stroke-linecap="round">
    <line x1="35" y1="13" x2="42" y2="22"/>
    <line x1="60" y1="8"  x2="60" y2="22"/>
    <line x1="85" y1="13" x2="78" y2="22"/>
  </g>

  <!-- Bold T glyph -->
  <g fill="#0a1628">
    <rect x="18" y="22" width="84" height="14" rx="3"/>
    <rect x="53" y="22" width="14" height="74" rx="3"/>
  </g>

  <!-- Foundation / knowledge base -->
  <rect x="28" y="104" width="64" height="4" rx="2" fill="#0a1628" opacity="0.35"/>
</svg>
